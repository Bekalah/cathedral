name: Auto Security Check

on:
  push:
    branches: [ main, master ]
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Check for secrets
        run: |
          if command -v gitleaks &> /dev/null; then
            gitleaks detect --source . --verbose || true
          else
            echo "Gitleaks not installed - skipping secret detection"
          fi
      
      - name: Dependency audit
        run: pnpm audit --audit-level=high || true
      
      - name: Enforce pnpm only
        run: |
          if [ -f "package-lock.json" ]; then
            echo "❌ ERROR: package-lock.json found - this repo uses pnpm only"
            exit 1
          fi
          echo "✅ pnpm-only check passed"
      
      - name: Check for console statements
        run: |
          if grep -r "console\.log\|console\.warn\|console\.error" packages/ apps/ --include="*.ts" --include="*.tsx" | grep -v "test\|spec"; then
            echo "⚠️ Console statements found in production code"
            exit 1
          fi
