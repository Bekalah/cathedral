name: Auto Build & Security Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * *' # Daily at midnight

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Security audit
        run: pnpm audit --audit-level=moderate || true
      
      - name: Enforce pnpm only
        run: |
          if [ -f "package-lock.json" ]; then
            echo "❌ ERROR: package-lock.json found - this repo uses pnpm only"
            exit 1
          fi
          echo "✅ pnpm-only check passed"
      
      - name: Build
        run: pnpm run build
      
      - name: Type check
        run: pnpm run type-check || true
      
      - name: Lint
        run: pnpm run lint || true
