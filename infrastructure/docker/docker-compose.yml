# 🏰 Cathedral Docker Compose
# 
# ⚠️  SECURITY: Use docker-compose.secure.yml for production!
# This file is for quick local development only.
# 
# For secure deployment:
#   1. cp ../../.env.template ../../.env
#   2. Edit .env with secure passwords
#   3. docker-compose -f docker-compose.secure.yml up

version: '3.8'

services:
  cathedral-app:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.cathedral
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - CATHEDRAL_ENV=${CATHEDRAL_ENV:-development}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cathedral}:${POSTGRES_PASSWORD:-dev_only_change_me}@postgres:5432/${POSTGRES_DB:-cathedral}
    volumes:
      - ../../:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      # ⚠️ CHANGE THESE IN PRODUCTION - use .env file
      POSTGRES_DB: ${POSTGRES_DB:-cathedral}
      POSTGRES_USER: ${POSTGRES_USER:-cathedral}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_only_change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cathedral}"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitoring:
    image: prom/prometheus:latest
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
