<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Outer circle -->
  <circle cx="50" cy="50" r="48" stroke="#b8860b" stroke-width="1" fill="none"/>
  
  <!-- Inner sacred geometry - vesica piscis -->
  <circle cx="35" cy="50" r="25" stroke="#b8860b" stroke-width="0.5" fill="none" opacity="0.6"/>
  <circle cx="65" cy="50" r="25" stroke="#b8860b" stroke-width="0.5" fill="none" opacity="0.6"/>
  
  <!-- Central diamond -->
  <path d="M50 25 L75 50 L50 75 L25 50 Z" stroke="#b8860b" stroke-width="1" fill="none"/>
  
  <!-- Inner diamond -->
  <path d="M50 35 L65 50 L50 65 L35 50 Z" stroke="#b8860b" stroke-width="0.75" fill="#b8860b" fill-opacity="0.1"/>
  
  <!-- Center point -->
  <circle cx="50" cy="50" r="3" fill="#b8860b"/>
  
  <!-- Cardinal points -->
  <circle cx="50" cy="25" r="2" fill="#b8860b"/>
  <circle cx="75" cy="50" r="2" fill="#b8860b"/>
  <circle cx="50" cy="75" r="2" fill="#b8860b"/>
  <circle cx="25" cy="50" r="2" fill="#b8860b"/>
</svg>

